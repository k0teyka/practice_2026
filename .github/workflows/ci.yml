name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore practice2026.slnx /p:ContinueOnError=WarnAndContinue || true

    - name: Build
      run: dotnet build practice2026.slnx --no-restore /p:ContinueOnError=WarnAndContinue

    - name: Test
      run: dotnet test task09tests/task09tests.csproj --no-build --verbosity normal